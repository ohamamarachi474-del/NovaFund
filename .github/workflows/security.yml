name: Security Audit

on:
  pull_request:
    paths:
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - 'backend/package.json'
      - 'frontend/package.json'
      - '.github/workflows/security.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - 'backend/package.json'
      - 'frontend/package.json'
      - '.github/workflows/security.yml'
  schedule:
    # Run security audit daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  backend-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit
        working-directory: backend
        run: |
          echo "Running npm audit for backend..."
          npm audit --audit-level=high --json > audit-results.json 2>&1 || true
          
          # Ensure the file exists even if audit fails
          if [ ! -f audit-results.json ]; then
            echo '{"vulnerabilities": {}, "metadata": {"vulnerabilities": {"critical": 0, "high": 0, "moderate": 0, "low": 0}}}' > audit-results.json
          fi
          
      - name: Check for high severity vulnerabilities
        working-directory: backend
        run: |
          HIGH_VULNS=$(npm audit --audit-level=high 2>&1 | grep -c "high" || true)
          CRITICAL_VULNS=$(npm audit --audit-level=critical 2>&1 | grep -c "critical" || true)
          
          echo "High severity vulnerabilities: $HIGH_VULNS"
          echo "Critical severity vulnerabilities: $CRITICAL_VULNS"
          
          if [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "❌ CRITICAL vulnerabilities found!"
            npm audit --audit-level=critical
            exit 1
          fi
          
          if [ "$HIGH_VULNS" -gt 5 ]; then
            echo "⚠️  Warning: More than 5 high severity vulnerabilities found"
            npm audit --audit-level=high
            # Don't fail on high vulnerabilities, just warn
            exit 0
          fi
          
          echo "✅ Security audit passed"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-audit-results
          path: backend/audit-results.json
          retention-days: 30

      - name: Create issue for critical vulnerabilities
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'backend/audit-results.json';
            
            // Check if file exists
            if (!fs.existsSync(path)) {
              console.log('Audit results file not found, skipping issue creation');
              return;
            }
            
            try {
              const auditResults = fs.readFileSync(path, 'utf8');
              const audit = JSON.parse(auditResults);
              
              const criticalVulns = Object.values(audit.vulnerabilities || {}).filter(
                v => v.severity === 'critical'
              );
              
              if (criticalVulns.length > 0) {
                const body = `## 🔴 Critical Security Vulnerabilities Detected\n\n` +
                  `**Date:** ${new Date().toISOString()}\n` +
                  `**Branch:** ${context.ref}\n\n` +
                  `### Vulnerabilities:\n\n` +
                  criticalVulns.map(v => {
                    return `#### ${v.name}\n` +
                      `- **Severity:** Critical\n` +
                      `- **Version:** ${v.via[0]?.version || 'N/A'}\n` +
                      `- **Vulnerable Versions:** ${v.via[0]?.range || 'N/A'}\n` +
                      `- **Description:** ${v.via[0]?.title || 'N/A'}\n` +
                      `- **Fix:** Run \`npm audit fix --force\` or update to ${v.via[0]?.recommendation || 'latest'}\n`;
                  }).join('\n') +
                  `\n### Actions Required:\n` +
                  `- [ ] Review and fix critical vulnerabilities\n` +
                  `- [ ] Run \`npm audit fix\` to auto-fix compatible vulnerabilities\n` +
                  `- [ ] Manually update packages that require breaking changes\n` +
                  `- [ ] Test application after updates\n` +
                  `- [ ] Re-run security audit to verify fixes\n\n` +
                  `### Quick Fix Commands:\n` +
                  '```bash\n' +
                  `cd backend\n` +
                  `npm audit fix\n` +
                  `npm audit fix --force  # For critical fixes\n` +
                  '```\n';
                
                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '🔴 Critical Security Vulnerabilities - Backend',
                  body: body,
                  labels: ['security', 'critical', 'automated']
                });
              }
            } catch (error) {
              console.log('Failed to parse audit results:', error.message);
            }

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run npm audit
